<ion-header>
  <ion-toolbar>
    <ion-title>Đăng nhập</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <ion-item>
      <ion-label position="floating">Email</ion-label>
      <ion-input type="email" formControlName="email"></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="floating">Mật khẩu</ion-label>
      <ion-input type="password" formControlName="password"></ion-input>
    </ion-item>

    <ion-text color="danger" *ngIf="errorMsg">
      <p class="ion-padding-start">{{ errorMsg }}</p>
    </ion-text>

    <ion-button expand="block" type="submit" [disabled]="loading" class="ion-margin-top">
      <ion-spinner *ngIf="loading" name="crescent"></ion-spinner>
      <span *ngIf="!loading">Đăng nhập</span>
    </ion-button>

    <ion-button expand="block" fill="clear" routerLink="/auth/register">
      Chưa có tài khoản? Đăng ký
    </ion-button>
  </form>
</ion-content>
